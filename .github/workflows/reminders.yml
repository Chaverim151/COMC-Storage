name: Daily Equipment Reminders

on:
  schedule:
    # 2:00 PM Eastern = 18:00 UTC (19:00 UTC during daylight saving)
    # Using 18:00 UTC to cover EST, switch to 19:00 for EDT if needed
    - cron: "0 18 * * *"
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Send overdue equipment reminders
        run: |
          node << 'EOF'
          const https = require("https");

          const FIREBASE_PROJECT = "comc-storage";
          const FIREBASE_API_KEY = "AIzaSyAYZVEJfe8RFgit-0nwIndTCaGE8drUKz4";
          const TELZIO_API_KEY   = "pk_58125cd82e5116d32c3a319626bd";
          const TELZIO_SECRET    = "sk_8bd5769893fe85c1fb4ecce8f0";
          const FROM_NUMBER      = "7328443577";

          // Simple fetch wrapper for Node
          function request(url, options = {}) {
            return new Promise((resolve, reject) => {
              const urlObj = new URL(url);
              const req = https.request({
                hostname: urlObj.hostname,
                path: urlObj.pathname + urlObj.search,
                method: options.method || "GET",
                headers: options.headers || {}
              }, res => {
                let data = "";
                res.on("data", chunk => data += chunk);
                res.on("end", () => {
                  try { resolve({ ok: res.statusCode < 300, status: res.statusCode, body: JSON.parse(data) }); }
                  catch(e) { resolve({ ok: res.statusCode < 300, status: res.statusCode, body: data }); }
                });
              });
              req.on("error", reject);
              if (options.body) req.write(options.body);
              req.end();
            });
          }

          async function firestoreGet(collection, filters = []) {
            let url = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT}/databases/(default)/documents/${collection}?key=${FIREBASE_API_KEY}`;
            const res = await request(url);
            return res.body?.documents || [];
          }

          function getField(doc, field) {
            const f = doc.fields?.[field];
            if (!f) return undefined;
            return f.stringValue ?? f.integerValue ?? f.booleanValue ?? f.doubleValue ??
              f.timestampValue ?? (f.arrayValue?.values?.map(v => getField({fields:v}, "")) ?? undefined);
          }

          function getFieldRaw(doc, field) {
            return doc.fields?.[field];
          }

          async function firestoreUpdate(docPath, fields) {
            const url = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT}/databases/(default)/documents/${docPath}?key=${FIREBASE_API_KEY}&currentDocument.exists=true`;
            const body = { fields };
            const res = await request(url, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body)
            });
            return res;
          }

          async function firestoreAdd(collection, fields) {
            const url = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT}/databases/(default)/documents/${collection}?key=${FIREBASE_API_KEY}`;
            const res = await request(url, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ fields })
            });
            return res;
          }

          async function sendSMS(toPhone, message) {
            const to = toPhone.replace(/\D/g, "");
            if (to.length < 10) { console.log("Invalid phone:", toPhone); return false; }
            const toFormatted = to.length === 10 ? "1" + to : to;
            const auth = Buffer.from(TELZIO_API_KEY + ":" + TELZIO_SECRET).toString("base64");
            const res = await request("https://api.telzio.com/sms", {
              method: "POST",
              headers: { "Content-Type": "application/json", "Authorization": "Basic " + auth },
              body: JSON.stringify({ from: FROM_NUMBER, to: toFormatted, body: message })
            });
            console.log("SMS to", toFormatted, "- Status:", res.status, JSON.stringify(res.body));
            return res.ok;
          }

          async function main() {
            console.log("Checking overdue equipment at", new Date().toISOString());
            const now = Date.now();

            // Get equipment map
            const equipDocs = await firestoreGet("equipment");
            const equipMap = {};
            equipDocs.forEach(d => {
              const id = d.name.split("/").pop();
              equipMap[id] = {
                name:         d.fields?.name?.stringValue || "",
                eqId:         d.fields?.eqId?.stringValue || "",
                reminderDays: parseInt(d.fields?.reminderDays?.integerValue ?? "7")
              };
            });

            // Get open calls
            const callDocs = await firestoreGet("calls");
            let sent = 0;

            for (const callDoc of callDocs) {
              const fields  = callDoc.fields || {};
              const status  = fields.status?.stringValue;
              const phone   = fields.callerPhone?.stringValue;
              const alreadySent = fields.reminderSent?.booleanValue;
              const openedAt = fields.openedAt?.timestampValue;
              const callNum  = fields.callNumber?.stringValue || "?";
              const member   = fields.memberName?.stringValue || "";

              if (status !== "open")   continue;
              if (!phone)              continue;
              if (alreadySent)         continue;
              if (!openedAt)           continue;

              const daysOut = (now - new Date(openedAt).getTime()) / (1000 * 60 * 60 * 24);
              const items   = fields.items?.arrayValue?.values || [];

              for (const itemVal of items) {
                const itemFields = itemVal.mapValue?.fields || {};
                const firestoreId = itemFields.firestoreId?.stringValue;
                const itemName    = itemFields.name?.stringValue || "Equipment";
                const eqId        = itemFields.eqId?.stringValue || "";
                const eq          = equipMap[firestoreId] || {};
                const reminderDays = eq.reminderDays ?? 7;

                if (reminderDays === 0)        continue;
                if (daysOut < reminderDays)    continue;

                const borrowedDate = new Date(openedAt).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
                const msg =
                  "Hi! This is a reminder from Chaverim of Middlesex County that the " +
                  itemName + " (" + eqId + ") you borrowed on " + borrowedDate +
                  " may be ready to return. If you're done using it, please call us at (732) 844-3577 to arrange pickup. Thank you!";

                console.log(`Sending reminder for Call #${callNum} to ${phone} (${daysOut.toFixed(1)} days out)`);
                const ok = await sendSMS(phone, msg);

                if (ok) {
                  const docId = callDoc.name.split("/").pop();
                  await firestoreUpdate("calls/" + docId, {
                    reminderSent:   { booleanValue: true },
                    reminderSentAt: { timestampValue: new Date().toISOString() }
                  });
                  await firestoreAdd("log", {
                    action:        { stringValue: "REMINDER_SENT" },
                    callNumber:    { stringValue: callNum },
                    equipmentName: { stringValue: itemName + " (" + eqId + ")" },
                    memberName:    { stringValue: member },
                    userId:        { stringValue: "system" },
                    userName:      { stringValue: "Automated Daily Reminder" },
                    timestamp:     { timestampValue: new Date().toISOString() }
                  });
                  sent++;
                  console.log("✓ Reminder sent for Call #" + callNum);
                  break;
                }
              }
            }

            console.log("Done. Total reminders sent:", sent);
          }

          main().catch(e => { console.error("Error:", e); process.exit(1); });
          EOF
