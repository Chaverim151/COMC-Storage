<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>COMC Equipment Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- jsQR with fallback CDNs -->
  <script>
    function loadScript(urls, idx) {
      if (idx >= urls.length) { console.error("All jsQR CDNs failed"); return; }
      var s = document.createElement("script");
      s.src = urls[idx];
      s.onload  = function() { console.log("jsQR loaded from: " + urls[idx]); };
      s.onerror = function() { console.warn("jsQR CDN failed: " + urls[idx]); loadScript(urls, idx+1); };
      document.head.appendChild(s);
    }
    loadScript([
      "https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js",
      "https://unpkg.com/jsqr@1.4.0/dist/jsQR.js",
      "https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"
    ], 0);
  </script>

  <script type="module">
    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged,
             sendPasswordResetEmail, createUserWithEmailAndPassword, updateProfile }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, doc, getDocs, getDoc, addDoc, updateDoc,
             deleteDoc, onSnapshot, serverTimestamp, query, orderBy, setDoc, writeBatch }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ── FIREBASE CONFIG ──────────────────────────────────────────
    const firebaseConfig = {
      apiKey:            "AIzaSyAYZVEJfe8RFgit-0nwIndTCaGE8drUKz4",
      authDomain:        "comc-storage.firebaseapp.com",
      projectId:         "comc-storage",
      storageBucket:     "comc-storage.firebasestorage.app",
      messagingSenderId: "384295811042",
      appId:             "1:384295811042:web:0bd625958132fac9532bbb"
    };

    const app          = initializeApp(firebaseConfig);
    const auth         = getAuth(app);
    const db           = getFirestore(app);
    const secondaryApp = initializeApp(firebaseConfig, "secondary");
    const secondaryAuth= getAuth(secondaryApp);

    let currentUser     = null;
    let currentRole     = null;
    let currentUserUnit = null;
    let unsubs          = [];

    // equipmentMap: firestoreId -> { name, eqId, status, brokenNote, ... }
    // status: "available" | "out" | "broken"
    let equipmentMap   = {};
    let activeCallsMap = {}; // callId -> call data
    let checkoutItems  = []; // [{firestoreId, name, eqId}]

    // ── AUTH ─────────────────────────────────────────────────────
    onAuthStateChanged(auth, async user => {
      if (user) {
        currentUser = user;
        try {
          const snap = await getDoc(doc(db, "users", user.uid));
          if (snap.exists()) {
            currentRole     = snap.data().role       || "member";
            currentUserUnit = snap.data().unitNumber || null;
          } else { currentRole = "member"; currentUserUnit = null; }
        } catch(e) { currentRole = "member"; currentUserUnit = null; }
        showApp();
      } else {
        currentUser = null; currentRole = null; currentUserUnit = null;
        showLogin();
      }
    });

    async function lookupEmailByUnit(unit) {
      const snap = await getDocs(collection(db, "users"));
      let email = null;
      snap.forEach(d => { if (String(d.data().unitNumber).trim() === String(unit).trim()) email = d.data().email; });
      return email;
    }

    window.login = async function() {
      const unit = document.getElementById("l-unit").value.trim().replace(/^MC-?/i,"");
      const pass = document.getElementById("l-pass").value.trim();
      const err  = document.getElementById("l-error");
      err.textContent = ""; err.style.color = "var(--red)";
      if (!unit || !pass) { err.textContent = "Enter unit number and password."; return; }
      let email = null;
      try { email = await lookupEmailByUnit(unit); } catch(e) {}
      if (!email) { err.textContent = "Unit number not found. Contact your admin."; return; }
      try { await signInWithEmailAndPassword(auth, email, pass); }
      catch(e) {
        const codes = ["auth/user-not-found","auth/wrong-password","auth/invalid-credential"];
        if (codes.includes(e.code)) err.textContent = "Incorrect password.";
        else if (e.code==="auth/too-many-requests") err.textContent = "Too many attempts. Try later.";
        else err.textContent = e.message;
      }
    };

    window.forgotPassword = async function() {
      const unit = document.getElementById("l-unit").value.trim().replace(/^MC-?/i,"");
      const err  = document.getElementById("l-error");
      if (!unit) { err.style.color="var(--orange)"; err.textContent="Enter unit number first."; return; }
      let email = null;
      try { email = await lookupEmailByUnit(unit); } catch(e) {}
      if (!email) { err.style.color="var(--red)"; err.textContent="Unit not found."; return; }
      try { await sendPasswordResetEmail(auth, email); err.style.color="var(--green)"; err.textContent="Reset email sent!"; }
      catch(e) { err.style.color="var(--red)"; err.textContent="Could not send reset email."; }
    };

    window.logout = async function() { unsubs.forEach(u=>u()); unsubs=[]; await signOut(auth); };

    // ── VIEWS ────────────────────────────────────────────────────
    function showLogin() {
      document.getElementById("view-login").style.display = "flex";
      document.getElementById("view-app").style.display   = "none";
    }
    function showApp() {
      document.getElementById("view-login").style.display = "none";
      document.getElementById("view-app").style.display   = "block";
      document.getElementById("user-name").textContent = currentUser.displayName || currentUser.email;
      document.getElementById("user-role").textContent = currentRole==="admin" ? "Admin" : "Member";
      document.querySelectorAll(".admin-only").forEach(el => el.style.display = currentRole==="admin" ? "" : "none");
      const memberField = document.getElementById("co-member");
      if (memberField) memberField.value = currentUser.displayName || "";
      loadEquipment();
      loadCalls();
      loadLog();
      window.loadUsers(); // always load, the tab is hidden for non-admins anyway
    }

    // ── ID GENERATION ────────────────────────────────────────────
    function getPrefix(name) {
      const l = name.toLowerCase();
      if (l.includes("12k") || l.includes("12,000")) return "AC-12K";
      if (l.includes("9k")  || l.includes("9,000"))  return "AC-9K";
      if (l.includes("6k")  || l.includes("6,000"))  return "AC-6K";
      if (l.includes("5k")  || l.includes("5,000"))  return "AC-5K";
      if (l.includes("ac"))        return "AC";
      if (l.includes("large heater") || (l.includes("heater") && l.includes("large"))) return "Heater-L";
      if (l.includes("small heater") || (l.includes("heater") && l.includes("small"))) return "Heater-S";
      if (l.includes("heater"))    return "Heater";
      if (l.includes("fan"))       return "Fan";
      if (l.includes("ez spare"))  return "EZ-Spare";
      if (l.includes("spare"))     return "Spare";
      return "EQ";
    }

    function nextIdForPrefix(prefix, existingIds) {
      const nums = existingIds
        .filter(id => id && id.toLowerCase().startsWith(prefix.toLowerCase()+"-"))
        .map(id => parseInt(id.split("-").pop()) || 0);
      return (nums.length ? Math.max(...nums) : 0) + 1;
    }

    // ── LOAD EQUIPMENT ───────────────────────────────────────────
    function loadEquipment() {
      const u1 = onSnapshot(query(collection(db,"equipment"), orderBy("eqId")), snap => {
        equipmentMap = {};
        snap.forEach(d => { equipmentMap[d.id] = d.data(); });
        renderInventory();
        renderCheckinList();
        populateCheckoutDropdown();
      });
      const u2 = onSnapshot(query(collection(db,"calls"), orderBy("openedAt","desc")), snap => {
        activeCallsMap = {};
        snap.forEach(d => {
          if(d.data().status==="open") activeCallsMap[d.id]=d.data();
        });
        console.log("activeCallsMap updated:", Object.keys(activeCallsMap), Object.values(activeCallsMap).map(c=>c.callNumber));
        renderInUse();
        renderCheckinList();
        populateCheckoutDropdown();
      });
      unsubs.push(u1, u2);
    }

    // ── INVENTORY TAB ────────────────────────────────────────────
    function renderInventory() {
      const container = document.getElementById("inventory-list");
      const search    = (document.getElementById("inv-search")?.value||"").toLowerCase();
      container.innerHTML = "";

      const items = Object.entries(equipmentMap)
        .filter(([,d]) => !search || d.name.toLowerCase().includes(search) || (d.eqId||"").toLowerCase().includes(search))
        .sort((a,b) => (a[1].eqId||"").localeCompare(b[1].eqId||"", undefined, {numeric:true}));

      if (!items.length) { container.innerHTML='<div class="empty">No equipment found.</div>'; return; }

      // ── SUMMARY ──────────────────────────────────────────────
      if (!search) {
        // Build summary grouped by category
        const summary = {};
        Object.values(equipmentMap).forEach(d => {
          const l = d.name.toLowerCase();
          let category;
          if (l.includes("heater"))        category = "Heaters";
          else if (l.includes("ac"))       category = "AC Units";
          else if (l.includes("fan"))      category = "Fans";
          else if (l.includes("ez spare")) category = "EZ Spares";
          else if (l.includes("spare"))    category = "Spares";
          else category = "Other";

          if (!summary[category]) summary[category] = { total:0, available:0, out:0, broken:0 };
          summary[category].total++;
          if (d.status==="available") summary[category].available++;
          else if (d.status==="out")    summary[category].out++;
          else if (d.status==="broken") summary[category].broken++;
        });

        const summaryCard = document.createElement("div");
        summaryCard.className = "summary-card";
        summaryCard.innerHTML = `
          <div class="summary-title">&#128202; Inventory Summary</div>
          <div class="summary-grid">
            ${Object.entries(summary)
              .sort((a,b) => {
                const order = ["AC Units","Heaters","Fans","EZ Spares","Spares","Other"];
                return order.indexOf(a[0]) - order.indexOf(b[0]);
              })
              .map(([cat, s]) => `
                <div class="summary-row">
                  <div class="summary-name">${cat}</div>
                  <div class="summary-stats">
                    <span class="sum-avail">&#10003; ${s.available} avail</span>
                    ${s.out    ? `<span class="sum-out">&#8599; ${s.out} out</span>` : ""}
                    ${s.broken ? `<span class="sum-broken">&#128683; ${s.broken} broken</span>` : ""}
                    <span class="sum-total">${s.total} total</span>
                  </div>
                </div>
              `).join("")}
          </div>
        `;
        container.appendChild(summaryCard);
      }

      // Group by prefix for display
      const groups = {};
      items.forEach(([id, d]) => {
        const prefix = getPrefix(d.name);
        if (!groups[prefix]) groups[prefix] = [];
        groups[prefix].push([id, d]);
      });

      Object.entries(groups).forEach(([prefix, list]) => {
        const label = document.createElement("div");
        label.className = "section-label";
        label.textContent = prefix + "s (" + list.length + ")";
        container.appendChild(label);

        list.forEach(([id, d]) => {
          const statusColor = d.status==="out" ? "status-out" : d.status==="broken" ? "status-broken" : "status-ok";
          const statusText  = d.status==="out" ? "OUT" : d.status==="broken" ? "BROKEN" : "AVAIL";
          const card = document.createElement("div");
          card.className = "eq-card";
          card.innerHTML = `
            <div class="eq-header">
              <div>
                <div class="eq-name">${d.name}</div>
                <div class="eq-id-badge">${d.eqId||"No ID"}</div>
              </div>
              <div class="eq-badge ${statusColor}">${statusText}</div>
            </div>
            ${d.manufacturer||d.modelNumber ? `
            <div class="eq-meta-row">
              ${d.manufacturer ? `<span>&#127981; ${d.manufacturer}</span>` : ""}
              ${d.modelNumber  ? `<span>&#128203; ${d.modelNumber}</span>` : ""}
            </div>` : ""}
            ${d.replacementValue ? `<div class="eq-meta-row"><span>&#128176; Replacement: $${parseFloat(d.replacementValue).toFixed(2)}</span>${d.placeOfPurchase?`<span>&#128722; ${d.placeOfPurchase}</span>`:""}</div>` : ""}
            ${d.status==="broken" && d.brokenNote ? `<div class="broken-note">&#128683; ${d.brokenNote}</div>` : ""}
            <div class="eq-actions" style="margin-top:8px;">
              ${d.reorderLink ? `<a href="${d.reorderLink}" target="_blank" class="eq-btn btn-reorder">&#128722; Reorder</a>` : ""}
              <span class="admin-only" style="display:${currentRole==="admin"?"contents":"none"}">
                <button class="eq-btn btn-broken" onclick="markBroken('${id}','${d.name}')" ${d.status==="broken"?"disabled":""}>&#128683; Broken</button>
                ${d.eqId ? `<button class="eq-btn btn-qr" onclick="showQRModal('${d.eqId}','${d.name}')">&#9638; QR</button>` : ""}
                <button class="eq-btn btn-edit" onclick="editEquipment('${id}')">&#9998; Edit</button>
              </span>
            </div>
          `;
          container.appendChild(card);
        });
      });
    }

    window.filterInventory = function() { renderInventory(); };

    // ── CHECK OUT TAB ─────────────────────────────────────────────
    function populateCheckoutDropdown() {
      const sel = document.getElementById("co-equip-select");
      if (!sel) return;
      sel.innerHTML = '<option value="">— Select equipment type —</option>';

      // Group available items by name
      const groups = {};
      const stagedIds = checkoutItems.map(i => i.firestoreId);
      Object.entries(equipmentMap)
        .filter(([id, d]) => d.status === "available" && !stagedIds.includes(id))
        .forEach(([id, d]) => {
          if (!groups[d.name]) groups[d.name] = [];
          groups[d.name].push({id, d});
        });

      Object.keys(groups).sort().forEach(name => {
        const count = groups[name].length;
        const opt   = document.createElement("option");
        opt.value   = name;
        opt.textContent = name + "  (" + count + " available)";
        sel.appendChild(opt);
      });

      // Reset the specific ID dropdown
      const idSel = document.getElementById("co-id-select");
      if (idSel) { idSel.innerHTML = '<option value="">— Select type first —</option>'; idSel.disabled = true; }
    }

    window.onTypeSelect = function() {
      const typeSel = document.getElementById("co-equip-select");
      const idSel   = document.getElementById("co-id-select");
      const name    = typeSel.value;
      idSel.innerHTML = "";
      if (!name) {
        idSel.innerHTML = '<option value="">— Select type first —</option>';
        idSel.disabled = true;
        return;
      }
      const stagedIds = checkoutItems.map(i => i.firestoreId);
      const available = Object.entries(equipmentMap)
        .filter(([id, d]) => d.name === name && d.status === "available" && !stagedIds.includes(id))
        .sort((a,b) => (a[1].eqId||"").localeCompare(b[1].eqId||"", undefined, {numeric:true}));

      if (!available.length) {
        idSel.innerHTML = '<option value="">No units available</option>';
        idSel.disabled = true;
        return;
      }

      idSel.disabled = false;
      idSel.innerHTML = '<option value="">— Select unit ID —</option>';
      available.forEach(([id, d]) => {
        const opt = document.createElement("option");
        opt.value = id;
        opt.textContent = (d.eqId || id);
        idSel.appendChild(opt);
      });

      // Auto-select if only one unit available
      if (available.length === 1) {
        idSel.value = available[0][0];
        idSel.style.borderColor = "var(--sky)";
        showToast("Only unit: " + (available[0][1].eqId || available[0][0]));
      } else {
        idSel.style.borderColor = "";
      }
    };

    window.addItemToCheckout = function() {
      const firestoreId = document.getElementById("co-id-select")?.value;
      if (!firestoreId) { alert("Select a specific unit ID."); return; }
      const d = equipmentMap[firestoreId];
      if (!d) { alert("Item not found."); return; }
      if (d.status !== "available") { alert(d.eqId + " is no longer available."); return; }
      if (checkoutItems.find(i => i.firestoreId === firestoreId)) { showToast(d.eqId + " already added."); return; }
      checkoutItems.push({ firestoreId, name: d.name, eqId: d.eqId || "" });
      renderCheckoutItems();
      showToast("Added: " + (d.eqId||d.name));
      // Reset selectors
      document.getElementById("co-equip-select").value = "";
      const idSel = document.getElementById("co-id-select");
      idSel.innerHTML = '<option value="">— Select type first —</option>';
      idSel.disabled = true;
      populateCheckoutDropdown();
    };

    function renderCheckoutItems() {
      const c = document.getElementById("co-items-list");
      c.innerHTML = "";
      if (!checkoutItems.length) { c.innerHTML='<div class="empty-small">No items added yet.</div>'; return; }
      checkoutItems.forEach((item, i) => {
        const row = document.createElement("div");
        row.className = "staged-item";
        row.innerHTML = `
          <div class="staged-name">${item.name} <span class="staged-eqid">${item.eqId}</span></div>
          <button class="staged-remove" onclick="removeCheckoutItem(${i})">&#10005;</button>
        `;
        c.appendChild(row);
      });
    }

    window.removeCheckoutItem = function(i) { checkoutItems.splice(i,1); renderCheckoutItems(); };

    window.submitCheckout = async function() {
      const callNum  = document.getElementById("co-callnum").value.trim();
      const location = document.getElementById("co-location").value.trim();
      const member   = document.getElementById("co-member").value.trim();
      const notes    = document.getElementById("co-notes").value.trim();
      if (!callNum)  { alert("Call number required."); return; }
      if (!member)   { alert("Member name required."); return; }
      if (!checkoutItems.length) { alert("Add at least one item."); return; }

      // Verify still available
      for (const item of checkoutItems) {
        if (equipmentMap[item.firestoreId]?.status !== "available") {
          alert(item.eqId + " — " + item.name + " is no longer available."); return;
        }
      }

      const batch = writeBatch(db);
      checkoutItems.forEach(item => {
        batch.update(doc(db,"equipment",item.firestoreId), { status: "out" });
      });

      const callRef = doc(collection(db,"calls"));
      batch.set(callRef, {
        callNumber: callNum, location, memberName: member,
        memberUnit: currentUserUnit || "",
        notes, status: "open",
        items: checkoutItems.map(i => ({firestoreId:i.firestoreId, name:i.name, eqId:i.eqId})),
        openedBy: currentUser.displayName || currentUser.email,
        openedByUid: currentUser.uid,
        openedAt: serverTimestamp(),
      });
      await batch.commit();

      await addLog({
        action: "CALL_OPENED", callNumber: callNum, location, memberName: member,
        items: checkoutItems.map(i=>i.eqId+" — "+i.name).join(", "),
        userId: currentUser.uid, userName: currentUser.displayName || currentUser.email,
      });

      checkoutItems = [];
      renderCheckoutItems();
      ["co-callnum","co-location","co-notes"].forEach(id => document.getElementById(id).value="");
      switchTab("checkin", document.querySelector('.tab[data-tab="checkin"]'));
      showToast("Call #"+callNum+" opened!");
    };

    // ── CHECK IN TAB ─────────────────────────────────────────────
    function renderCheckinList() {
      const c = document.getElementById("checkin-calls-list");
      if (!c) return;
      c.innerHTML = "";
      const calls = Object.entries(activeCallsMap);
      if (!calls.length) { c.innerHTML='<div class="empty">&#10003; No open calls.</div>'; return; }
      calls.sort((a,b) => (b[1].openedAt?.seconds||0) - (a[1].openedAt?.seconds||0));
      calls.forEach(([callId, call]) => {
        const ts      = call.openedAt?.toDate();
        const time    = ts ? ts.toLocaleString() : "—";
        const isLegacy = (call.items||[]).some(i => !i.firestoreId);
        const card    = document.createElement("div");
        card.className = "call-card";
        card.style.borderLeftColor = "var(--sky)";

        const header = document.createElement("div");
        header.innerHTML = `
          <div class="call-header">
            <div class="call-num">Call #${call.callNumber}</div>
            <div class="call-status-badge" style="background:rgba(124,200,232,.2);color:var(--sky)">OPEN</div>
          </div>
          <div class="call-meta-row">
            ${call.location   ? `<span>&#128205; ${call.location}</span>` : ""}
            ${call.memberName ? `<span>&#128100; ${call.memberName}${call.memberUnit?" (MC-"+call.memberUnit+")":""}</span>` : ""}
          </div>
          <div class="call-items-label" style="font-size:.68rem;font-weight:600;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;">Tap item to return:</div>
        `;
        card.appendChild(header);

        // Item rows — tap individual item to return it
        (call.items||[]).forEach(item => {
          const row = document.createElement("div");
          row.className = "call-item" + (item.firestoreId ? " checkin-item" : "");
          row.innerHTML = `
            <span class="call-item-name">${item.name||item.equipmentName||"Unknown"} ${item.eqId ? '<span class="call-item-eqid">'+item.eqId+'</span>' : ""}</span>
            ${item.firestoreId
              ? '<span class="checkin-return-tag">&#10003; Return</span>'
              : '<span style="font-size:.72rem;color:var(--muted)">legacy</span>'}
          `;
          if (item.firestoreId) {
            row.style.cursor = "pointer";
            row.addEventListener("click", function() {
              returnSingleItem(callId, item.firestoreId, item.eqId||item.name||"");
            });
          }
          card.appendChild(row);
        });

        const footer = document.createElement("div");
        footer.style.marginTop = "8px";
        footer.innerHTML = `<div class="call-footer-meta">${call.openedBy||""} &bull; ${time}</div>`;
        card.appendChild(footer);

        // Buttons
        const btnRow = document.createElement("div");
        btnRow.style.cssText = "display:flex;gap:8px;margin-top:8px;";

        if (!isLegacy) {
          const partialBtn = document.createElement("button");
          partialBtn.className = "partial-return-btn";
          partialBtn.style.flex = "1";
          partialBtn.innerHTML = "&#8634; Partial Return";
          partialBtn.addEventListener("click", function() { showPartialReturn(callId); });
          btnRow.appendChild(partialBtn);
        }

        // Add equipment button
        const addBtn = document.createElement("button");
        addBtn.style.cssText = "flex:1;padding:10px;background:rgba(124,200,232,.15);color:var(--sky);border:1px solid rgba(124,200,232,.3);border-radius:7px;font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:700;text-transform:uppercase;cursor:pointer;letter-spacing:.04em;";
        addBtn.innerHTML = "&#43; Add Item";
        addBtn.addEventListener("click", function() { showAddToCall(callId); });
        btnRow.appendChild(addBtn);
        card.appendChild(btnRow);

        // Hero close button — last
        if (!isLegacy) {
          const closeBtn = document.createElement("button");
          closeBtn.className = "submit-checkout-btn";
          closeBtn.style.cssText = "width:100%;margin-top:8px;";
          closeBtn.innerHTML = "&#10003; Return All &amp; Close Call";
          closeBtn.addEventListener("click", function() { closeCall(callId); });
          card.appendChild(closeBtn);
        } else {
          const closeBtn = document.createElement("button");
          closeBtn.className = "submit-checkout-btn";
          closeBtn.style.cssText = "width:100%;margin-top:8px;opacity:.7;";
          closeBtn.innerHTML = "&#10003; Close Call";
          closeBtn.addEventListener("click", async function() {
            if (!confirm("Close Call #"+call.callNumber+"? (Equipment status won't be updated — legacy call)")) return;
            await updateDoc(doc(db,"calls",callId), { status:"closed", closedAt:serverTimestamp(), closedBy:currentUser.displayName||currentUser.email });
            showToast("Call #"+call.callNumber+" closed.");
          });
          card.appendChild(closeBtn);
        }

        c.appendChild(card);
      });
    }

    window.returnSingleItem = async function(callId, firestoreId, eqId) {
      console.log("returnSingleItem called:", callId, firestoreId, eqId);
      const call = activeCallsMap[callId];
      console.log("call found:", call);
      if (!call) { alert("Call not found in activeCallsMap. Try refreshing."); return; }

        console.log("batch committed successfully");
        await addLog({ action:"CHECK_IN", callNumber:call.callNumber, equipmentName:item.name+" ("+eqId+")",

      const updatedItems = [...(call.items||[]), newItem];

      try {
        const batch = writeBatch(db);
        batch.update(doc(db,"equipment",firestoreId), { status:"out" });
        batch.update(doc(db,"calls",callId), { items: updatedItems });
        await batch.commit();
        await addLog({
          action: "ITEM_ADDED_TO_CALL",
          callNumber: call.callNumber,
          equipmentName: d.name + " (" + (d.eqId||firestoreId) + ")",
          userId: currentUser.uid,

    async function confirmPartialReturn(callId) {
      // Always read fresh from activeCallsMap
      const call = activeCallsMap[callId];
      if (!call) { alert("Call not found. Try refreshing."); return; }

      const items = (call.items||[]).filter(i => i.firestoreId);
      const returning = [];
      const remaining = [];

      items.forEach((item, i) => {
        const checkbox = document.getElementById("pr-"+i);
        const checked  = checkbox ? checkbox.checked : false;
        if (checked) returning.push(item);
        else remaining.push(item);
      });

      // Keep any legacy items in remaining
      (call.items||[]).filter(i => !i.firestoreId).forEach(i => remaining.push(i));

      if (!returning.length) { alert("Select at least one item to return."); return; }

      console.log("Returning:", returning.map(i=>i.eqId));
      console.log("Remaining:", remaining.map(i=>i.eqId));

      try {
        const batch = writeBatch(db);
        returning.forEach(item => {
          batch.update(doc(db,"equipment",item.firestoreId), { status:"available" });
        });
        if (remaining.length === 0) {
          batch.update(doc(db,"calls",callId), { status:"closed", closedAt:serverTimestamp(), closedBy:currentUser.displayName||currentUser.email });
        } else {
          batch.update(doc(db,"calls",callId), { items: remaining });
        }
        await batch.commit();
        console.log("Partial return committed successfully");
        await addLog({
          action: "PARTIAL_RETURN",
          callNumber: call.callNumber,
          items: returning.map(i=>i.eqId||i.name).join(", "),
          userId: currentUser.uid,
          userName: currentUser.displayName||currentUser.email
        });

        showToast(returning.length + " item" + (returning.length>1?"s":"") + " returned from Call #"+call.callNumber);
      } catch(e) {
        console.error("Partial return error:", e);
        alert("Error: "+e.message);
      }
    }

    // ── QR SCANNER ───────────────────────────────────────────────
    let scannerStream   = null;
    let scannerRAF      = null;
    let scannerMode     = "checkout";
    let lastScanned     = "";

    window.openScanner = function(mode) {
      scannerMode = mode || "checkout";
      lastScanned = "";
      const modal  = document.getElementById("scanner-modal");
      const status = document.getElementById("scanner-status");
      modal.style.display  = "flex";
      status.textContent   = "Requesting camera…";
      status.style.color   = "var(--muted)";

      if (scannerStream) { scannerStream.getTracks().forEach(t=>t.stop()); scannerStream=null; }
      if (scannerRAF)    { cancelAnimationFrame(scannerRAF); scannerRAF=null; }

      const video  = document.getElementById("scanner-video");
      const canvas = document.getElementById("scanner-canvas");

      navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: "environment" } },
        audio: false
      })
      .then(stream => {
        scannerStream  = stream;
        video.srcObject = stream;
        video.setAttribute("playsinline","true");
        video.muted = true;

        // Use onloadedmetadata to start scanning once video size is known
        video.onloadedmetadata = function() {
          video.play().then(() => {
            // Check if jsQR loaded, wait a moment if not
            if (!window.jsQR) {
              status.textContent = "Loading scanner library…";
              let attempts = 0;
              const waitForJsQR = setInterval(() => {
                attempts++;
                if (window.jsQR) {
                  clearInterval(waitForJsQR);
                  status.textContent = "📷 Scanning… hold steady";
                  status.style.color = "var(--muted)";
                  tickScan();
                } else if (attempts > 20) {
                  clearInterval(waitForJsQR);
                  status.style.color = "var(--red)";
                  status.innerHTML = "Scanner library failed to load.<br><small>Try refreshing the page.</small>";
                }
              }, 200);
            } else {
              status.textContent = "📷 Scanning… hold steady";
              status.style.color = "var(--muted)";
              tickScan();
            }
          });
        };
      })
      .catch(err => {
        status.style.color = "var(--red)";
        if (err.name==="NotAllowedError") status.textContent="Camera permission denied.";
        else if (err.name==="NotFoundError") status.textContent="No camera found.";
        else status.textContent="Camera error: "+err.message;
      });

      function tickScan() {
        if (!scannerStream) return;

        const vw = video.videoWidth;
        const vh = video.videoHeight;

        if (!vw || !vh) {
          // Video not ready yet, try again
          scannerRAF = requestAnimationFrame(tickScan);
          return;
        }

        canvas.width  = vw;
        canvas.height = vh;
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        ctx.drawImage(video, 0, 0, vw, vh);

        let found = false;
        try {
          const imgData = ctx.getImageData(0, 0, vw, vh);
          if (window.jsQR) {
            const code = window.jsQR(imgData.data, imgData.width, imgData.height, {
              inversionAttempts: "attemptBoth"
            });
            if (code && code.data && code.data !== lastScanned) {
              lastScanned = code.data;
              status.style.color  = "var(--green)";
              status.textContent  = "✓ " + code.data;
              found = true;
              // Vibrate if supported
              if (navigator.vibrate) navigator.vibrate(100);
              if (scannerMode === "checkin") {
                closeScanner();
                handleCheckinScan(code.data.startsWith("COMC:") ? code.data.replace("COMC:","") : code.data);
              } else {
                handleCheckoutScan(code.data.startsWith("COMC:") ? code.data.replace("COMC:","") : code.data);
                // Reset after 2s to allow next scan
                setTimeout(() => { lastScanned = ""; status.style.color="var(--muted)"; status.textContent="Scan next item or tap ✕ to close"; }, 2000);
              }
            }
          } else {
            status.textContent = "⚠ jsQR not loaded";
            status.style.color = "var(--orange)";
          }
        } catch(e) { /* ignore */ }

        if (!found) {
          scannerRAF = requestAnimationFrame(tickScan);
        } else if (scannerMode !== "checkin") {
          // keep scanning for checkout mode
          setTimeout(() => { if(scannerStream) { scannerRAF=requestAnimationFrame(tickScan); } }, 2000);
        }
      }
    };

    window.closeScanner = function() {
      if (scannerRAF)    { cancelAnimationFrame(scannerRAF); scannerRAF=null; }
      if (scannerStream) { scannerStream.getTracks().forEach(t=>t.stop()); scannerStream=null; }
      const video = document.getElementById("scanner-video");
      if (video) { video.srcObject=null; video.onloadedmetadata=null; }
      document.getElementById("scanner-modal").style.display = "none";
    };

    function handleQRScan(raw) {
      const eqId = raw.startsWith("COMC:") ? raw.replace("COMC:","") : raw;
      if (scannerMode==="checkin") handleCheckinScan(eqId);
      else handleCheckoutScan(eqId);
    }

    function handleCheckoutScan(eqId) {
      const match = Object.entries(equipmentMap).find(([,d])=>d.eqId===eqId);
      if (!match) { showScanStatus("Unknown: "+eqId, "red"); return; }
      const [firestoreId, d] = match;
      if (d.status!=="available") { showScanStatus(eqId+" is "+d.status.toUpperCase(), "red"); return; }
      if (checkoutItems.find(i=>i.firestoreId===firestoreId)) { showScanStatus(eqId+" already added","orange"); return; }
      checkoutItems.push({ firestoreId, name:d.name, eqId:d.eqId||"" });
      renderCheckoutItems();

      // Show item added popup
      showItemAddedPopup(d.eqId, d.name);
    }

    function showItemAddedPopup(eqId, name) {
      // Remove any existing popup
      const existing = document.getElementById("scan-popup");
      if (existing) existing.remove();

      const popup = document.createElement("div");
      popup.id = "scan-popup";
      popup.innerHTML = `
        <div class="scan-popup-icon">&#10003;</div>
        <div class="scan-popup-title">Item Added!</div>
        <div class="scan-popup-eqid">${eqId}</div>
        <div class="scan-popup-name">${name}</div>
        <div class="scan-popup-actions">
          <button class="scan-popup-btn scan-another" onclick="scanAnother()">&#128247; Scan Another</button>
          <button class="scan-popup-btn scan-done" onclick="closeScanPopup()">&#10003; Done</button>
        </div>
      `;
      document.getElementById("scanner-modal").appendChild(popup);

      // Auto-dismiss after 4s if no action
      popup._timeout = setTimeout(() => { closeScanPopup(); }, 4000);
    }

    window.scanAnother = function() {
      closeScanPopup();
      // Reset lastScanned so scanner picks up next code
      lastScanned = "";
      const status = document.getElementById("scanner-status");
      status.style.color = "var(--muted)";
      status.textContent = "📷 Scan next item…";
      // Resume scan loop
      if (scannerStream) {
        const video  = document.getElementById("scanner-video");
        const canvas = document.getElementById("scanner-canvas");
        function loop() {
          if (!scannerStream) return;
          const vw = video.videoWidth, vh = video.videoHeight;
          if (!vw || !vh) { scannerRAF = requestAnimationFrame(loop); return; }
          canvas.width = vw; canvas.height = vh;
          const ctx = canvas.getContext("2d", { willReadFrequently: true });
          ctx.drawImage(video, 0, 0, vw, vh);
          try {
            const imgData = ctx.getImageData(0, 0, vw, vh);
            if (window.jsQR) {
              const code = window.jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts:"attemptBoth" });
              if (code && code.data && code.data !== lastScanned) {
                lastScanned = code.data;
                status.style.color = "var(--green)";
                status.textContent = "✓ " + code.data;
                if (navigator.vibrate) navigator.vibrate(100);
                const eqId = code.data.startsWith("COMC:") ? code.data.replace("COMC:","") : code.data;
                handleCheckoutScan(eqId);
                return;
              }
            }
          } catch(e) {}
          scannerRAF = requestAnimationFrame(loop);
        }
        scannerRAF = requestAnimationFrame(loop);
      }
    };

    window.closeScanPopup = function() {
      const popup = document.getElementById("scan-popup");
      if (!popup) return;
      if (popup._timeout) clearTimeout(popup._timeout);
      popup.remove();
      closeScanner();
    };

    function handleCheckinScan(eqId) {
      const match = Object.entries(activeCallsMap).find(([,call])=>
        (call.items||[]).some(i=>i.eqId===eqId)
      );
      if (!match) { showScanStatus(eqId+" not in any open call","red"); return; }
      const [callId, call] = match;
      const item = call.items.find(i=>i.eqId===eqId);
      showScanStatus("Found: Call #"+call.callNumber, "green");
      closeScanner();
      if (confirm("Return "+eqId+" from Call #"+call.callNumber+"?")) {
        returnSingleItem(callId, item.firestoreId, eqId);
      }
    }

    function showScanStatus(msg, color) {
      const s = document.getElementById("scanner-status");
      s.textContent  = msg;
      s.style.color  = color==="green"?"var(--green)":color==="red"?"var(--red)":"var(--orange)";
    }

    // ── QR CODE MODAL ─────────────────────────────────────────────

    window.printQR = function(eqId, name) {

        <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script>
        </head><body><div class="label">
        <div id="qr"></div><h2>${eqId}</h2><p>${name}</p></div>
        <script>new QRCode(document.getElementById("qr"),{text:"COMC:${eqId}",width:160,height:160,colorDark:"#000",colorLight:"#fff"});
        setTimeout(()=>window.print(),800);<\/script></body></html>`);
      w.document.close();

      document.getElementById("modal-body").innerHTML = `

    window.migrateData = async function() {
      const snap = await getDocs(collection(db,"equipment"));
      const toMigrate = snap.docs.filter(d => (d.data().totalQty||1) > 1 || !d.data().status);
      if (!toMigrate.length) { showToast("Nothing to migrate."); return; }

      let preview = "Will expand:\n";
      toMigrate.forEach(d => { preview += "• "+d.data().name+" × "+(d.data().totalQty||1)+"\n"; });
      if (!confirm(preview+"\nProceed?")) return;

      // Build list of existing IDs to avoid collision
      const existingIds = snap.docs.map(d=>d.data().eqId||"").filter(Boolean);

      const batch = writeBatch(db);
      for (const docSnap of toMigrate) {
        const d     = docSnap.data();
        const total = d.totalQty || 1;
        const prefix= getPrefix(d.name);
        // Delete original grouped record
        batch.delete(doc(db,"equipment",docSnap.id));
        // Create individual unit records
        for (let i=0; i<total; i++) {
          const num   = nextIdForPrefix(prefix, existingIds);
          const eqId  = prefix+"-"+num;
          existingIds.push(eqId);
          const ref   = doc(collection(db,"equipment"));
          batch.set(ref, {
            name: d.name,
            eqId,
            status: "available",
            createdAt: serverTimestamp(),
          });
        }
      }
      await batch.commit();
      await addLog({ action:"MIGRATED", equipmentName:toMigrate.length+" grouped records expanded",
        userId:currentUser.uid, userName:currentUser.displayName||currentUser.email });
      showToast("Migration complete!");
    };

    window.exportLog = async function() {
      const snap = await getDocs(query(collection(db,"log"),orderBy("timestamp","desc")));
      if (snap.empty) { showToast("No log entries."); return; }
      const headers = ["Date/Time","Action","Equipment","Call #","Location","Member","Items/Notes","By"];
      const rows = [];
      snap.forEach(d => {
        const data=d.data(), ts=data.timestamp?.toDate();
        rows.push([ts?ts.toLocaleString():"", (data.action||"").replace(/_/g," "),
          data.equipmentName||"", data.callNumber||"", data.location||"",
          data.memberName||"", data.items||data.notes||"", data.userName||""]);
      });
      if (!window.JSZip) {
        const s=document.createElement("script");
        s.src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
        s.onload=()=>buildAndDownloadXlsx(headers,rows);
        document.head.appendChild(s);
      } else buildAndDownloadXlsx(headers,rows);
    };

    function buildAndDownloadXlsx(headers,rows) {
      const allStrings=[]; const strIdx={};
      function si(v){ const s=String(v??""); if(strIdx[s]===undefined){strIdx[s]=allStrings.length;allStrings.push(s);} return strIdx[s]; }
      let sheetXml="";
      [headers,...rows].forEach((row,ri)=>{
        sheetXml+=`<row r="${ri+1}">`;
        row.forEach((cell,ci)=>{ const col=String.fromCharCode(65+ci),ref=col+(ri+1); sheetXml+=`<c r="${ref}" t="s"><v>${si(cell)}</v></c>`; });
        sheetXml+="</row>";
      });
      const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      const ssXml=`<?xml version="1.0" encoding="UTF-8"?><sst xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" count="${allStrings.length}" uniqueCount="${allStrings.length}">${allStrings.map(s=>`<si><t>${esc(s)}</t></si>`).join("")}</sst>`;
      const wsXml=`<?xml version="1.0" encoding="UTF-8"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>${sheetXml}</sheetData></worksheet>`;
      const wbXml=`<?xml version="1.0" encoding="UTF-8"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="Log" sheetId="1" r:id="rId1"/></sheets></workbook>`;
      const wbRels=`<?xml version="1.0"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/sharedStrings" Target="sharedStrings.xml"/></Relationships>`;
      const ct=`<?xml version="1.0"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/><Override PartName="/xl/sharedStrings.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sharedStrings+xml"/></Types>`;
      const rels=`<?xml version="1.0"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>`;
      const zip=new JSZip();
      zip.file("[Content_Types].xml",ct); zip.file("_rels/.rels",rels);
      zip.file("xl/workbook.xml",wbXml); zip.file("xl/_rels/workbook.xml.rels",wbRels);
      zip.file("xl/worksheets/sheet1.xml",wsXml); zip.file("xl/sharedStrings.xml",ssXml);
      zip.generateAsync({type:"blob",mimeType:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"}).then(blob=>{
        const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
        a.download="COMC-Log-"+new Date().toISOString().slice(0,10)+".xlsx"; a.click();
        showToast("Log exported!");
      });
    }

    // ── MODAL / TOAST / HELPERS ───────────────────────────────────
    window.closeModal = function() {
      document.getElementById("modal").style.display="none";
      document.getElementById("modal-confirm").style.display="";
    };
    window.addEventListener("click", e=>{ if(e.target.id==="modal") closeModal(); });

    function showToast(msg) {
      const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
      setTimeout(()=>t.classList.remove("show"),2800);
    }
    window.filterInventory=function(){renderInventory();};
  </script>

    /* SCANNER */
    #scanner-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;flex-direction:column;align-items:center;justify-content:center;padding:16px;}

    #scanner-status{text-align:center;color:var(--muted);font-size:.85rem;margin-top:12px;padding:8px;min-height:36px;}

    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--steel);color:#fff;padding:10px 20px;border-radius:20px;font-size:.88rem;font-weight:600;opacity:0;transition:opacity .3s,transform .3s;z-index:9999;pointer-events:none;}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    .loading,.empty{text-align:center;color:var(--muted);padding:40px 0;font-size:.88rem;}

</head>

      <div class="form-row">
        <div class="form-group"><label>Call Number *</label><input type="text" id="co-callnum" placeholder="e.g. 247"></div>
        <div class="form-group"><label>Member</label><input type="text" id="co-member" placeholder="Your name"></div>
      </div>
      <div class="form-group"><label>Location</label><input type="text" id="co-location" placeholder="Address or cross-streets"></div>
      <div class="form-group"><label>Notes</label><input type="text" id="co-notes" placeholder="Optional"></div>
    </div>
    <div class="co-form">
      <h3>&#128230; Add Equipment</h3>
      <button class="scan-btn" onclick="openScanner('checkout')">&#128247; Scan QR Code</button>
      <div class="scan-divider"><span>or select manually</span></div>
      <div class="form-group">
        <label>Equipment Type</label>
        <select id="co-equip-select" onchange="onTypeSelect()">
          <option value="">— Select type —</option>
        </select>
      </div>
      <div class="form-group">
        <label>Specific Unit ID</label>
        <select id="co-id-select" disabled>
          <option value="">— Select type first —</option>
        </select>
      </div>
      <button class="tbtn tbtn-muted" onclick="addItemToCheckout()" style="width:100%;">+ Add Item</button>
      <div id="co-items-list"><div class="empty-small">No items added yet.</div></div>
    </div>
    <button class="submit-checkout-btn" onclick="submitCheckout()">&#128229; Submit &amp; Check Out</button>
  </div>

  <!-- CHECK IN -->
  <div id="tab-checkin" class="tab-content">
    <div class="co-form">
      <h3>&#128247; Scan to Check In</h3>
      <button class="scan-btn" onclick="openScanner('checkin')">&#128247; Scan QR Code</button>
      <div class="scan-divider"><span>or select from open calls below</span></div>
    </div>
    <div id="checkin-calls-list"></div>
  </div>

  <!-- INVENTORY -->
  <div id="tab-inventory" class="tab-content">
    <div class="toolbar">
      <input type="text" id="inv-search" placeholder="&#128269; Search..." oninput="filterInventory()">
      <button class="tbtn tbtn-primary admin-only" onclick="showAddEquipment()">+ Add</button>
      <button class="tbtn tbtn-muted   admin-only" onclick="showBulkAdd()">+ Bulk</button>
    </div>
    <div id="inventory-list"></div>
  </div>

  <!-- USERS -->
  <div id="tab-users" class="tab-content">
    <div class="toolbar">
      <button class="tbtn tbtn-primary" onclick="showAddUser()" style="width:100%">+ Add New User</button>
    </div>
    <div id="users-list"></div>
  </div>

  <!-- LOG -->
  <div id="tab-log" class="tab-content">
    <div class="toolbar admin-only">
      <button class="tbtn tbtn-muted" onclick="exportLog()" style="width:100%">&#11015; Export Log as Excel</button>
    </div>
    <div id="log-list"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box">
    <h2 id="modal-title"></h2>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-ok" id="modal-confirm">Confirm</button>
    </div>
  </div>
</div>

<!-- SCANNER -->
<div id="scanner-modal">
  <div class="scanner-inner">
    <div class="scanner-header">
      <div class="scanner-title">&#128247; Scan QR Code</div>
      <button class="scanner-close" onclick="closeScanner()">&#10005;</button>
    </div>
    <div class="scanner-video-wrap">
      <video id="scanner-video" playsinline muted></video>
      <canvas id="scanner-canvas" style="display:none;position:absolute;top:0;left:0;width:100%;opacity:0;pointer-events:none;"></canvas>
      <div class="scanner-frame"><div class="scanner-box"></div></div>
    </div>
    <div id="scanner-status">Initializing camera…</div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  function switchTab(name, el) {
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
    if(el) el.classList.add("active");
    document.getElementById("tab-"+name).classList.add("active");
    // Refresh users list every time the tab is opened
    if (name === "users" && window.loadUsers) window.loadUsers();
  }
</script>
</body>
</html>
