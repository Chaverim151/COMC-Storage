<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>COMC Equipment Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

  <script type="module">
    import { initializeApp, initializeApp as initSecondary } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail,
             createUserWithEmailAndPassword, updateProfile, deleteUser, getAdditionalUserInfo }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, doc, getDocs, getDoc, addDoc, updateDoc,
             deleteDoc, onSnapshot, serverTimestamp, query, orderBy, where, setDoc }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyAYZVEJfe8RFgit-0nwIndTCaGE8drUKz4",
      authDomain:        "comc-storage.firebaseapp.com",
      projectId:         "comc-storage",
      storageBucket:     "comc-storage.firebasestorage.app",
      messagingSenderId: "384295811042",
      appId:             "1:384295811042:web:0bd625958132fac9532bbb"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let currentUser = null;
    let currentRole = null;
    let currentUserUnit = null;
    let unsubs = [];

    // ── SEED DATA ────────────────────────────────────────────────
    const SEED_EQUIPMENT = [
      { name: "AC Unit 12K Btu",       totalQty: 1  },
      { name: "AC Unit 9K Btu",         totalQty: 3  },
      { name: "AC Window 5K Btu Unit",  totalQty: 2  },
      { name: "AC Window 6K Btu Unit",  totalQty: 3  },
      { name: "Fan",                     totalQty: 5  },
      { name: "Large Heater",            totalQty: 13 },
      { name: "Small Heater",            totalQty: 2  },
      { name: "EZ Spare 125/80R17",      totalQty: 1  },
      { name: "EZ Spare 145/80R17",      totalQty: 1  },
      { name: "EZ Spare 155/85R18",      totalQty: 1  },
      { name: "EZ Spare 135/80R18",      totalQty: 1  },
      { name: "EZ Spare 145/60R20",      totalQty: 1  },
      { name: "EZ Spare 175/70R20",      totalQty: 1  },
      { name: "EZ Spare 145/85R18",      totalQty: 1  },
      { name: "Spare 55/70D17",          totalQty: 1  },
      { name: "Spare 145/80D17",         totalQty: 1  },
    ];

    // ── AUTH ─────────────────────────────────────────────────────
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        try {
          const snap = await getDoc(doc(db, "users", user.uid));
          if (snap.exists()) {
            currentRole     = snap.data().role       || "member";
            currentUserUnit = snap.data().unitNumber || null;
          } else {
            currentRole = "member"; currentUserUnit = null;
          }
        } catch(e) { currentRole = "member"; currentUserUnit = null; }
        showApp();
      } else {
        currentUser = null; currentRole = null; currentUserUnit = null;
        showLogin();
      }
    });

    async function lookupEmailByUnit(unit) {
      console.log("Looking up unit:", unit);
      const snap = await getDocs(collection(db, "users"));
      console.log("Total users found:", snap.size);
      let email = null;
      snap.forEach(d => {
        const data = d.data();
        console.log("User doc:", d.id, "unitNumber:", data.unitNumber, "email:", data.email);
        if (String(data.unitNumber).trim() === String(unit).trim()) {
          email = data.email;
        }
      });
      console.log("Found email:", email);
      return email;
    }

    window.login = async function() {
      const unit = document.getElementById("l-unit").value.trim().replace(/^MC-?/i,"");
      const pass = document.getElementById("l-pass").value.trim();
      const err  = document.getElementById("l-error");
      err.textContent = ""; err.style.color = "var(--red)";
      if (!unit || !pass) { err.textContent = "Please enter your unit number and password."; return; }

      let email = null;
      try { email = await lookupEmailByUnit(unit); } catch(e) {}

      if (!email) { err.textContent = "Unit number not found. Contact your admin."; return; }

      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch(e) {
        const codes = ["auth/user-not-found","auth/wrong-password","auth/invalid-credential"];
        if (codes.includes(e.code)) err.textContent = "Incorrect password.";
        else if (e.code === "auth/too-many-requests") err.textContent = "Too many attempts. Try again later.";
        else err.textContent = "Error: " + e.message;
      }
    };

    window.forgotPassword = async function() {
      const unit = document.getElementById("l-unit").value.trim().replace(/^MC-?/i,"");
      const err  = document.getElementById("l-error");
      if (!unit) { err.style.color = "var(--orange)"; err.textContent = "Enter your unit number above first."; return; }

      let email = null;
      try { email = await lookupEmailByUnit(unit); } catch(e) {}

      if (!email) { err.style.color = "var(--red)"; err.textContent = "Unit number not found."; return; }

      try {
        await sendPasswordResetEmail(auth, email);
        err.style.color = "var(--green)"; err.textContent = "Reset email sent to your registered address!";
      } catch(e) { err.style.color = "var(--red)"; err.textContent = "Could not send reset email."; }
    };

    window.logout = async function() {
      unsubs.forEach(u => u());
      unsubs = [];
      await signOut(auth);
    };

    // ── VIEWS ────────────────────────────────────────────────────
    function showLogin() {
      document.getElementById("view-login").style.display = "flex";
      document.getElementById("view-app").style.display   = "none";
    }

    function showApp() {
      document.getElementById("view-login").style.display = "none";
      document.getElementById("view-app").style.display   = "block";
      document.getElementById("user-name").textContent = currentUser.displayName || currentUser.email;
      document.getElementById("user-role").textContent = currentRole === "admin" ? "Admin" : "Member";
      document.querySelectorAll(".admin-only").forEach(el => {
        el.style.display = currentRole === "admin" ? "" : "none";
      });
      // Pre-fill member name on checkout form
      const memberField = document.getElementById("co-member");
      if (memberField) memberField.value = currentUser.displayName || currentUser.email;
      loadEquipment();
      loadActiveCalls();
      loadLog();
      if (currentRole === "admin") loadUsers();
    }

    // ── EQUIPMENT STATE (shared) ──────────────────────────────────
    let equipmentMap   = {}; // id -> data
    let activeCallsMap = {}; // id -> call data (status=open)

    function getInUse(equipId) {
      return Object.values(activeCallsMap)
        .flatMap(c => c.items || [])
        .filter(i => i.equipmentId === equipId)
        .reduce((s, i) => s + (i.qty || 1), 0);
    }

    function getAvail(equipId) {
      const d = equipmentMap[equipId];
      if (!d) return 0;
      return Math.max(0, (d.totalQty || 0) - getInUse(equipId) - (d.brokenQty || 0));
    }

    // ── LOAD EQUIPMENT ───────────────────────────────────────────
    function loadEquipment() {
      const container = document.getElementById("equipment-list");
      container.innerHTML = '<div class="loading">Loading...</div>';

      const u1 = onSnapshot(query(collection(db, "equipment"), orderBy("name")), snap => {
        equipmentMap = {};
        snap.forEach(d => { equipmentMap[d.id] = d.data(); });
        renderEquipmentList();
        populateCheckoutSelector();
      });

      const u2 = onSnapshot(query(collection(db, "calls"), where("status","==","open")), snap => {
        activeCallsMap = {};
        snap.forEach(d => { activeCallsMap[d.id] = d.data(); });
        renderEquipmentList();
        renderActiveCalls();
        renderCheckinCalls();
        populateCheckoutSelector();
      });

      unsubs.push(u1, u2);
    }

    function renderEquipmentList() {
      const container = document.getElementById("equipment-list");
      const search = document.getElementById("eq-search")?.value.toLowerCase() || "";
      container.innerHTML = "";

      const ids = Object.keys(equipmentMap).sort((a,b) =>
        equipmentMap[a].name.localeCompare(equipmentMap[b].name));

      if (ids.length === 0) {
        container.innerHTML = '<div class="empty">No equipment found. Use Seed DB to load inventory.</div>';
        return;
      }

      ids.forEach(id => {
        const d      = equipmentMap[id];
        if (search && !d.name.toLowerCase().includes(search)) return;
        const inUse  = getInUse(id);
        const broken = d.brokenQty || 0;
        const avail  = getAvail(id);
        const total  = d.totalQty || 0;
        const pct    = total > 0 ? Math.round((avail / total) * 100) : 0;
        const statusClass = avail === 0 ? "status-out" : inUse > 0 ? "status-partial" : "status-ok";

        const card = document.createElement("div");
        card.className = "eq-card";
        card.innerHTML = `
          <div class="eq-header">
            <div>
              <div class="eq-name">${d.name}</div>
              ${d.eqId ? `<div class="eq-id-badge">${d.eqId}</div>` : ''}
            </div>
            <div class="eq-badge ${statusClass}">${avail === 0 ? "OUT" : avail + " avail"}</div>
          </div>
          <div class="eq-bar-wrap"><div class="eq-bar" style="width:${pct}%"></div></div>
          <div class="eq-stats">
            <span>&#128642; ${inUse} in use</span>
            <span>&#128683; ${broken} broken</span>
            <span>&#128230; ${total} total</span>
          </div>
          <div class="eq-actions admin-only" style="display:${currentRole==='admin'?'flex':'none'}">
            <button class="eq-btn btn-broken" onclick="markBroken('${id}','${d.name}')" ${avail<=0?'disabled':''}>&#128683; Broken</button>
            ${d.eqId ? `<button class="eq-btn btn-qr" onclick="showQRCode('${d.eqId}','${d.name}')">&#9638; QR</button>` : ''}
            <button class="eq-btn btn-edit" onclick="editEquipment('${id}')">&#9998; Edit</button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // ── CHECK OUT TAB ─────────────────────────────────────────────
    // Holds items staged for the current checkout
    let checkoutItems = []; // [{equipmentId, name, qty}]

    function populateCheckoutSelector() {
      const sel = document.getElementById("co-equip-select");
      if (!sel) return;
      const current = sel.value;
      sel.innerHTML = '<option value="">— Select equipment —</option>';
      Object.keys(equipmentMap).sort((a,b) =>
        equipmentMap[a].name.localeCompare(equipmentMap[b].name)
      ).forEach(id => {
        const avail = getAvail(id);
        const d     = equipmentMap[id];
        const opt   = document.createElement("option");
        opt.value   = id;
        opt.textContent = (d.eqId ? d.eqId + " — " : "") + d.name + " (" + avail + " avail)";
        opt.disabled = avail <= 0;
        sel.appendChild(opt);
      });
      sel.value = current;
    }

    window.addItemToCheckout = function() {
      const sel = document.getElementById("co-equip-select");
      const qty = parseInt(document.getElementById("co-qty").value) || 1;
      const id  = sel.value;
      if (!id) { alert("Select an equipment item first."); return; }
      const avail = getAvail(id);
      if (qty > avail) { alert("Only " + avail + " available."); return; }

      const existing = checkoutItems.find(i => i.equipmentId === id);
      if (existing) {
        existing.qty += qty;
      } else {
        checkoutItems.push({
          equipmentId: id,
          name: equipmentMap[id].name,
          eqId: equipmentMap[id].eqId || "",
          qty,
        });
      }
      sel.value = "";
      document.getElementById("co-qty").value = 1;
      renderCheckoutItems();
    };

    function renderCheckoutItems() {
      const container = document.getElementById("co-items-list");
      container.innerHTML = "";
      if (checkoutItems.length === 0) {
        container.innerHTML = '<div class="empty-small">No items added yet.</div>';
        return;
      }
      checkoutItems.forEach((item, i) => {
        const row = document.createElement("div");
        row.className = "staged-item";
        row.innerHTML = `
          <div class="staged-name">${item.name}${item.eqId ? ' <span class="staged-eqid">'+item.eqId+'</span>' : ''}</div>
          <div class="staged-qty">x${item.qty}</div>
          <button class="staged-remove" onclick="removeCheckoutItem(${i})">&#10005;</button>
        `;
        container.appendChild(row);
      });
    }

    window.removeCheckoutItem = function(i) {
      checkoutItems.splice(i, 1);
      renderCheckoutItems();
    };

    window.submitCheckout = async function() {
      const callNum  = document.getElementById("co-callnum").value.trim();
      const location = document.getElementById("co-location").value.trim();
      const member   = document.getElementById("co-member").value.trim();
      const notes    = document.getElementById("co-notes").value.trim();

      if (!callNum)  { alert("Call number is required."); return; }
      if (!member)   { alert("Member name is required."); return; }
      if (checkoutItems.length === 0) { alert("Add at least one equipment item."); return; }

      // Verify availability one more time
      for (const item of checkoutItems) {
        if (getAvail(item.equipmentId) < item.qty) {
          alert(item.name + " no longer has enough availability."); return;
        }
      }

      await addDoc(collection(db, "calls"), {
        callNumber: callNum,
        location,
        memberName: member,
        memberUnit: currentUserUnit || "",
        notes,
        items: checkoutItems,
        status: "open",
        openedBy: currentUser.displayName || currentUser.email,
        openedByUid: currentUser.uid,
        openedAt: serverTimestamp(),
      });

      await addLog({
        action: "CALL_OPENED",
        callNumber: callNum,
        location,
        memberName: member,
        items: checkoutItems.map(i => i.name + " x" + i.qty).join(", "),
        userId: currentUser.uid,
        userName: currentUser.displayName || currentUser.email,
      });

      // Clear form
      checkoutItems = [];
      renderCheckoutItems();
      document.getElementById("co-callnum").value  = "";
      document.getElementById("co-location").value = "";
      document.getElementById("co-member").value   = "";
      document.getElementById("co-notes").value    = "";

      // Switch to In Use tab
      switchTab("inuse", document.querySelector('.tab[data-tab="inuse"]'));
      showToast("Call #" + callNum + " opened!");
    };

    // ── IN USE / CHECK IN TAB ─────────────────────────────────────
    function loadActiveCalls() {
      const u = onSnapshot(
        query(collection(db, "calls"), orderBy("openedAt", "desc")),
        snap => {
          activeCallsMap = {};
          snap.forEach(d => {
            if (d.data().status === "open") activeCallsMap[d.id] = d.data();
          });
          renderActiveCalls();
          renderCheckinCalls();
          renderEquipmentList();
          populateCheckoutSelector();
        }
      );
      unsubs.push(u);
    }

    function renderActiveCalls() {
      const container = document.getElementById("active-calls-list");
      container.innerHTML = "";
      const calls = Object.entries(activeCallsMap);
      if (calls.length === 0) {
        container.innerHTML = '<div class="empty">&#10003; All equipment is in. No open calls.</div>';
        return;
      }
      calls.sort((a,b) => (b[1].openedAt?.seconds||0) - (a[1].openedAt?.seconds||0));
      calls.forEach(([id, call]) => {
        const ts   = call.openedAt?.toDate();
        const time = ts ? ts.toLocaleString() : "—";
        const itemsList = (call.items || []).map(i =>
          `<div class="call-item">
            <span class="call-item-name">${i.name}${i.eqId ? '<span class="call-item-eqid">'+i.eqId+'</span>' : ''}</span>
            <span class="call-item-qty">x${i.qty}</span>
          </div>`
        ).join("");

        const card = document.createElement("div");
        card.className = "call-card";
        card.innerHTML = `
          <div class="call-header">
            <div class="call-num">Call #${call.callNumber}</div>
            <div class="call-status-badge">OPEN</div>
          </div>
          <div class="call-meta-row">
            ${call.location   ? `<span>&#128205; ${call.location}</span>` : ""}
            ${call.memberName ? `<span>&#128100; ${call.memberName}${call.memberUnit ? ' (MC-'+call.memberUnit+')' : ''}</span>` : ""}
          </div>
          <div class="call-items-wrap">
            <div class="call-items-label">Equipment:</div>
            ${itemsList}
          </div>
          ${call.notes ? `<div class="call-notes">&#128203; ${call.notes}</div>` : ""}
          <div class="call-footer-meta">Opened by ${call.openedBy} &bull; ${time}</div>
          <div class="call-actions">
            <button class="close-call-btn" onclick="closeCall('${id}')">&#10003; Close Call — Return All</button>
            <button class="partial-return-btn" onclick="partialReturn('${id}')">&#8634; Partial Return</button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    window.closeCall = async function(callId) {
      const call = activeCallsMap[callId];
      if (!call) return;
      if (!confirm("Close Call #" + call.callNumber + " and return all equipment?")) return;

      await updateDoc(doc(db, "calls", callId), {
        status: "closed",
        closedAt: serverTimestamp(),
        closedBy: currentUser.displayName || currentUser.email,
      });

      await addLog({
        action: "CALL_CLOSED",
        callNumber: call.callNumber,
        items: (call.items||[]).map(i => i.name + " x" + i.qty).join(", "),
        userId: currentUser.uid,
        userName: currentUser.displayName || currentUser.email,
      });
      showToast("Call #" + call.callNumber + " closed.");
    };

    window.partialReturn = async function(callId) {
      const call = activeCallsMap[callId];
      if (!call) return;

      const modal = document.getElementById("modal");
      const title = document.getElementById("modal-title");
      const body  = document.getElementById("modal-body");
      const btn   = document.getElementById("modal-confirm");

      title.textContent = "Partial Return — Call #" + call.callNumber;
      body.innerHTML = `
        <p style="font-size:0.82rem;color:var(--muted);margin-bottom:12px;">Select items to return:</p>
        ${(call.items||[]).map((item,i) => `
          <div class="form-group" style="display:flex;align-items:center;gap:10px;">
            <input type="checkbox" id="pr-${i}" checked style="width:18px;height:18px;accent-color:var(--sky);">
            <label for="pr-${i}" style="flex:1;text-transform:none;letter-spacing:0;font-size:0.9rem;color:var(--text);">${item.name}</label>
            <input type="number" id="pr-qty-${i}" value="${item.qty}" min="1" max="${item.qty}"
              style="width:60px;padding:6px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:0.9rem;">
          </div>
        `).join("")}
      `;
      btn.textContent = "Return Selected";
      btn.onclick = () => confirmPartialReturn(callId, call);
      modal.style.display = "flex";
    };

    async function confirmPartialReturn(callId, call) {
      const returning = [];
      const remaining = [];

      (call.items||[]).forEach((item, i) => {
        const checked  = document.getElementById("pr-" + i)?.checked;
        const retQty   = parseInt(document.getElementById("pr-qty-" + i)?.value) || item.qty;
        if (checked && retQty > 0) {
          returning.push({ ...item, qty: retQty });
          const leftover = item.qty - retQty;
          if (leftover > 0) remaining.push({ ...item, qty: leftover });
        } else {
          remaining.push(item);
        }
      });

      if (returning.length === 0) { alert("Select at least one item to return."); return; }

      if (remaining.length === 0) {
        // All returned — close the call
        await updateDoc(doc(db, "calls", callId), {
          status: "closed",
          closedAt: serverTimestamp(),
          closedBy: currentUser.displayName || currentUser.email,
        });
      } else {
        // Update items list
        await updateDoc(doc(db, "calls", callId), { items: remaining });
      }

      await addLog({
        action: "PARTIAL_RETURN",
        callNumber: call.callNumber,
        items: returning.map(i => i.name + " x" + i.qty).join(", "),
        userId: currentUser.uid,
        userName: currentUser.displayName || currentUser.email,
      });

      closeModal();
      showToast("Items returned from Call #" + call.callNumber);
    }

    // ── BROKEN ───────────────────────────────────────────────────
    window.markBroken = function(id, name) {
      const modal = document.getElementById("modal");
      const title = document.getElementById("modal-title");
      const body  = document.getElementById("modal-body");
      const btn   = document.getElementById("modal-confirm");
      title.textContent = "Mark Broken: " + name;
      body.innerHTML = `
        <div class="form-group"><label>Quantity</label>
          <input id="m-qty" type="number" value="1" min="1"></div>
        <div class="form-group"><label>Description of Issue</label>
          <input id="m-notes" type="text" placeholder="Describe what's broken"></div>
      `;
      btn.textContent = "Mark Broken";
      btn.onclick = () => confirmBroken(id, name);
      modal.style.display = "flex";
    };

    async function confirmBroken(id, name) {
      const qty   = parseInt(document.getElementById("m-qty")?.value) || 1;
      const notes = document.getElementById("m-notes")?.value.trim() || "";
      const ref   = doc(db, "equipment", id);
      const snap  = await getDoc(ref);
      await updateDoc(ref, { brokenQty: (snap.data().brokenQty || 0) + qty });
      await addLog({
        action: "BROKEN", equipmentName: name, qty, notes,
        userId: currentUser.uid,
        userName: currentUser.displayName || currentUser.email,
      });
      closeModal();
      showToast(name + " marked broken.");
    }

    // ── EQUIPMENT ID GENERATION ──────────────────────────────────
    function generateEquipmentId(name) {
      const lower = name.toLowerCase();
      let prefix = "EQ";
      if (lower.includes("heater"))        prefix = "Heater";
      else if (lower.includes("ac"))        prefix = "AC";
      else if (lower.includes("fan"))       prefix = "Fan";
      else if (lower.includes("ez spare"))  prefix = "EZ Spare";
      else if (lower.includes("spare"))     prefix = "Spare";

      // Find next available number for this prefix
      const existing = Object.values(equipmentMap)
        .map(d => d.eqId || "")
        .filter(id => id.toLowerCase().startsWith(prefix.toLowerCase() + "-"))
        .map(id => parseInt(id.split("-").pop()) || 0);
      const next = existing.length > 0 ? Math.max(...existing) + 1 : 1;
      return prefix + "-" + next;
    }

    // ── QR SCANNER ───────────────────────────────────────────────
    let scannerStream = null;
    let scannerInterval = null;
    let scannerMode = "checkout";

    window.openScanner = function(mode) {
      scannerMode = mode || "checkout";
      document.getElementById("scanner-modal").style.display = "flex";
      document.getElementById("scanner-status").textContent = "Starting camera...";
      startScanner();
    };

    window.closeScanner = function() {
      stopScanner();
      document.getElementById("scanner-modal").style.display = "none";
    };

    function startScanner() {
      const video  = document.getElementById("scanner-video");
      const canvas = document.getElementById("scanner-canvas");
      const ctx    = canvas.getContext("2d");
      const status = document.getElementById("scanner-status");

      navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => {
          scannerStream = stream;
          video.srcObject = stream;
          video.play();
          status.textContent = "Point camera at QR code";
          scannerInterval = setInterval(() => {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
              canvas.width  = video.videoWidth;
              canvas.height = video.videoHeight;
              ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
              const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
              if (window.jsQR) {
                const code = jsQR(imageData.data, imageData.width, imageData.height);
                if (code) handleQRScan(code.data);
              }
            }
          }, 200);
        })

    function stopScanner() {
      if (scannerInterval) { clearInterval(scannerInterval); scannerInterval = null; }
      if (scannerStream)   { scannerStream.getTracks().forEach(t => t.stop()); scannerStream = null; }
    }

    function handleQRScan(data) {
      const eqId = data.startsWith("COMC:") ? data.replace("COMC:","") : data;
      stopScanner();
      document.getElementById("scanner-modal").style.display = "none";
      if (scannerMode === "checkin") handleCheckinScan(eqId);
      else handleCheckoutScan(eqId);

    function handleCheckoutScan(eqId) {
      const match = Object.entries(equipmentMap).find(([,d]) => d.eqId === eqId);
      if (!match) { showToast("Unknown: " + eqId); return; }
      const [firestoreId, equipData] = match;
      if (getAvail(firestoreId) <= 0) { showToast(equipData.name + " is OUT!"); return; }
      const existing = checkoutItems.find(i => i.equipmentId === firestoreId);
      if (existing) existing.qty += 1;
      else checkoutItems.push({ equipmentId: firestoreId, name: equipData.name, eqId: equipData.eqId, qty: 1 });
      renderCheckoutItems();
      showToast("Added: " + equipData.name + " (" + eqId + ")");
    }

    function handleCheckinScan(eqId) {
      const matches = Object.entries(activeCallsMap).filter(([,call]) =>
        (call.items || []).some(i => i.eqId === eqId)
      );
      if (matches.length === 0) { showToast(eqId + " not found in any open call."); return; }
      const [callId, call] = matches[0];
      if (confirm("Return " + eqId + " from Call #" + call.callNumber + "?")) {
        doReturnItem(callId, call, eqId);
      }
    }

      const call = activeCallsMap[callId];

        await doReturnItem(callId, call, eqId);

    };

    async function doReturnItem(callId, call, eqId) {
      const returned  = (call.items||[]).find(i => i.eqId === eqId);
      const remaining = (call.items||[]).filter(i => i.eqId !== eqId);
      if (remaining.length === 0) {
        await updateDoc(doc(db, "calls", callId), {
          status: "closed", closedAt: serverTimestamp(),
          closedBy: currentUser.displayName || currentUser.email,
        });
      } else {
        await updateDoc(doc(db, "calls", callId), { items: remaining });
      }
      await addLog({
        action: "CHECK_IN", callNumber: call.callNumber,
        equipmentName: returned ? returned.name + " (" + eqId + ")" : eqId,
        userId: currentUser.uid,
        userName: currentUser.displayName || currentUser.email,

    window.bulkGenerateIds = async function() {
      const missing = Object.entries(equipmentMap).filter(([,d]) => !d.eqId);
      if (missing.length === 0) { showToast("All equipment already has IDs!"); return; }
      if (!confirm("Auto-generate IDs for " + missing.length + " equipment items that are missing one?")) return;

      // Build a temporary map including IDs we're about to assign
      // so numbering doesn't collide within the same batch
      const tempAssigned = {}; // prefix -> next number

      function getNextNum(prefix) {
        // Count existing IDs in DB with this prefix
        const existingNums = Object.values(equipmentMap)
          .map(d => d.eqId || "")
          .filter(id => id.toLowerCase().startsWith(prefix.toLowerCase() + "-"))
          .map(id => parseInt(id.split("-").pop()) || 0);
        // Also count what we've already assigned in this batch
        const batchNums = Object.entries(tempAssigned)
          .filter(([k]) => k === prefix)
          .map(([,v]) => v);
        const allNums = [...existingNums, ...batchNums];
        const next = allNums.length > 0 ? Math.max(...allNums) + 1 : 1;
        tempAssigned[prefix] = (tempAssigned[prefix] || 0);
        return next;
      }

      function getPrefixForName(name) {
        const lower = name.toLowerCase();
        if (lower.includes("heater"))       return "Heater";
        if (lower.includes("ac"))           return "AC";
        if (lower.includes("fan"))          return "Fan";
        if (lower.includes("ez spare"))     return "EZ Spare";
        if (lower.includes("spare"))        return "Spare";
        return "EQ";
      }

      // Sort by name for consistent numbering
      missing.sort((a,b) => a[1].name.localeCompare(b[1].name));

      // Track assigned IDs to avoid duplicates within batch
      const assignedIds = new Set(
        Object.values(equipmentMap).map(d => d.eqId).filter(Boolean)
      );

      const updates = [];
      for (const [id, data] of missing) {
        const prefix = getPrefixForName(data.name);
        let num = getNextNum(prefix);
        let newId = prefix + "-" + num;
        // Ensure uniqueness
        while (assignedIds.has(newId)) {
          num++;
          newId = prefix + "-" + num;
        }
        assignedIds.add(newId);
        if (!tempAssigned[prefix]) tempAssigned[prefix] = 0;
        tempAssigned[prefix] = num;
        updates.push({ id, name: data.name, newId });
      }

      // Show preview before saving
      const preview = updates.map(u => u.name + " → " + u.newId).join("\n");
      if (!confirm("Assign these IDs?\n\n" + preview)) return;

      // Write to Firestore
      await Promise.all(updates.map(u =>
        updateDoc(doc(db, "equipment", u.id), { eqId: u.newId })
      ));

      await addLog({
        action: "IDS_GENERATED",
        equipmentName: updates.length + " items assigned IDs",
        userId: currentUser.uid,
        userName: currentUser.displayName || currentUser.email,
      });

      showToast(updates.length + " IDs generated!");
    };

          const ts   = data.timestamp?.toDate();
          const time = ts ? ts.toLocaleString() : "—";
          const cls  = { CALL_OPENED:"log-out", CALL_CLOSED:"log-in", PARTIAL_RETURN:"log-in",
                         BROKEN:"log-broken", ADDED:"log-added", EDITED:"log-edited", DELETED:"log-deleted" }[data.action] || "";
          const row = document.createElement("div");
          row.className = "log-row " + cls;
          row.innerHTML = `
            <div class="log-action">${(data.action||"").replace(/_/g," ")}</div>
            <div class="log-detail">
              ${data.callNumber ? "<strong>Call #" + data.callNumber + "</strong> " : ""}
              ${data.equipmentName ? "<strong>" + data.equipmentName + "</strong>" : ""}
              ${data.items ? " &mdash; " + data.items : ""}
              ${data.memberName ? " &bull; " + data.memberName : ""}
              ${data.location ? " &bull; " + data.location : ""}
            </div>
            <div class="log-meta">${data.userName||""} &bull; ${time}</div>
          `;
          container.appendChild(row);
        });
      });
      unsubs.push(u);
    }

    // ── EXPORT LOG ───────────────────────────────────────────────
    window.exportLog = async function() {
      const snap = await getDocs(query(collection(db, "log"), orderBy("timestamp", "desc")));
      if (snap.empty) { showToast("No log entries to export."); return; }

      const headers = ["Date/Time","Action","Equipment / User","Call #","Location","Member","Items / Notes","By"];
      const rows = [];
      snap.forEach(d => {
        const data = d.data();
        const ts   = data.timestamp?.toDate();
        const time = ts ? ts.toLocaleString() : "";
        rows.push([
          time,
          (data.action || "").replace(/_/g," "),
          data.equipmentName || "",
          data.callNumber    || "",
          data.location      || "",
          data.memberName    || "",
          data.items         || data.notes || "",
          data.userName      || "",
        ]);
      });

      // Build xlsx binary manually (no library needed)
      function buildXlsx(headers, rows) {
        const xmlHeader = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n';

        // Shared strings
        const allStrings = [];
        const strIndex = {};
        function si(val) {
          const s = String(val ?? "");
          if (strIndex[s] === undefined) { strIndex[s] = allStrings.length; allStrings.push(s); }
          return strIndex[s];
        }

        // Build sheet rows
        let sheetXml = '';
        const allRows = [headers, ...rows];
        allRows.forEach((row, ri) => {
          sheetXml += `<row r="${ri+1}">`;
          row.forEach((cell, ci) => {
            const col = String.fromCharCode(65 + ci);
            const ref = col + (ri + 1);
            sheetXml += `<c r="${ref}" t="s"><v>${si(cell)}</v></c>`;
          });
          sheetXml += '</row>';
        });

        const sharedStringsXml = xmlHeader +
          `<sst xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" count="${allStrings.length}" uniqueCount="${allStrings.length}">` +
          allStrings.map(s => `<si><t>${s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</t></si>`).join('') +
          '</sst>';

        const worksheetXml = xmlHeader +
          '<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">' +
          '<sheetData>' + sheetXml + '</sheetData></worksheet>';

        const workbookXml = xmlHeader +
          '<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">' +
          '<sheets><sheet name="Log" sheetId="1" r:id="rId1"/></sheets></workbook>';

        const workbookRels =
          '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
          '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
          '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/>' +
          '<Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/sharedStrings" Target="sharedStrings.xml"/>' +
          '</Relationships>';

        const contentTypes =
          '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
          '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">' +
          '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>' +
          '<Default Extension="xml" ContentType="application/xml"/>' +
          '<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>' +
          '<Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>' +
          '<Override PartName="/xl/sharedStrings.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sharedStrings+xml"/>' +
          '</Types>';

        const relsMain =
          '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
          '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
          '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>' +
          '</Relationships>';

        return { workbookXml, worksheetXml, sharedStringsXml, workbookRels, contentTypes, relsMain };
      }

      const parts = buildXlsx(headers, rows);

      // Use JSZip via CDN to assemble the xlsx
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
      script.onload = async function() {
        const zip = new JSZip();
        zip.file('[Content_Types].xml', parts.contentTypes);
        zip.file('_rels/.rels', parts.relsMain);
        zip.file('xl/workbook.xml', parts.workbookXml);
        zip.file('xl/_rels/workbook.xml.rels', parts.workbookRels);
        zip.file('xl/worksheets/sheet1.xml', parts.worksheetXml);
        zip.file('xl/sharedStrings.xml', parts.sharedStringsXml);

        const blob = await zip.generateAsync({ type: 'blob', mimeType: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        const date = new Date().toISOString().slice(0,10);
        a.href     = url;
        a.download = 'COMC-Equipment-Log-' + date + '.xlsx';
        a.click();
        URL.revokeObjectURL(url);
        showToast('Log exported!');
      };
      document.head.appendChild(script);
    };

    // ── MODAL ────────────────────────────────────────────────────
    window.closeModal = function() {
      document.getElementById("modal").style.display = "none";
    };
    window.addEventListener("click", e => { if (e.target.id === "modal") closeModal(); });

    // ── SEARCH ───────────────────────────────────────────────────
    window.filterEquipment = function() { renderEquipmentList(); };

    // ── TOAST ────────────────────────────────────────────────────
    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2800);
    }
  </script>

    }
    .scan-divider::before, .scan-divider::after {
      content:''; flex:1; height:1px; background:var(--border);
    }

    /* STAGED ITEM EQ ID */
    .staged-eqid {
      font-family:'Barlow Condensed',sans-serif;
      font-size:.75rem; color:var(--sky);
      font-weight:700; letter-spacing:.06em;
      margin-left:6px;
    }

    /* CALL ITEM EQ ID */
    .call-item-eqid {
      font-family:'Barlow Condensed',sans-serif;
      font-size:.72rem; color:var(--muted);
      margin-left:6px;
    }

    /* TOAST */
    #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--steel); color:#fff; padding:10px 20px; border-radius:20px; font-size:.88rem; font-weight:600; opacity:0; transition:opacity .3s,transform .3s; z-index:9999; pointer-events:none; }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    .loading, .empty { text-align:center; color:var(--muted); padding:40px 0; font-size:.88rem; }
    .form-submit { width:100%; padding:13px; background:linear-gradient(135deg,var(--steel),var(--sky-dim)); color:#fff; border:none; border-radius:8px; font-family:'Barlow Condensed',sans-serif; font-size:1.1rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; cursor:pointer; margin-top:4px; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="view-login">
  <div class="login-box">
    <img src="https://i.ibb.co/WWx03S58/updated-logo.png" alt="COMC Logo">
    <h1>Equipment Manager</h1>
    <p>Chaverim of Middlesex County</p>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
      <span style="color:var(--sky);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;flex-shrink:0;">MC-</span>
      <input type="text" id="l-unit" placeholder="Unit Number (e.g. 412)"
             inputmode="numeric" style="margin-bottom:0;flex:1;"
             onkeydown="if(event.key==='Enter') login()">
    </div>
    <input type="password" id="l-pass" placeholder="Password"
           onkeydown="if(event.key==='Enter') login()">
    <button class="login-btn" onclick="login()">Sign In</button>
    <button class="forgot-btn" onclick="forgotPassword()">New user or forgot password? Reset here</button>
    <div id="l-error"></div>
  </div>
</div>

<!-- APP -->
<div id="view-app">
  <div class="app-header">
    <img src="https://i.ibb.co/WWx03S58/updated-logo.png" alt="Logo">
    <h1>Equipment</h1>
    <div class="user-info">
      <div class="name" id="user-name"></div>
      <div class="role" id="user-role"></div>
    </div>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="checkout"  onclick="switchTab('checkout',this)">&#128229; Check Out</div>
    <div class="tab"        data-tab="checkin"   onclick="switchTab('checkin',this)">&#128228; Check In</div>
    <div class="tab"        data-tab="inuse"     onclick="switchTab('inuse',this)">&#128642; In Use</div>
    <div class="tab"        data-tab="inventory" onclick="switchTab('inventory',this)">&#128230; Inventory</div>
    <div class="tab admin-only" data-tab="users" onclick="switchTab('users',this)">&#128101; Users</div>
    <div class="tab"        data-tab="log"       onclick="switchTab('log',this)">&#128203; Log</div>
  </div>

  <!-- CHECK OUT TAB -->
  <div id="tab-checkout" class="tab-content active">

    <div class="co-form">
      <h3>&#128222; Call Details</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Call Number *</label>
          <input type="text" id="co-callnum" placeholder="e.g. 247">
        </div>
        <div class="form-group">
          <label>Member</label>
          <input type="text" id="co-member" placeholder="Your name">
        </div>
      </div>
      <div class="form-group">
        <label>Location</label>
        <input type="text" id="co-location" placeholder="Address or cross-streets">
      </div>
      <div class="form-group">
        <label>Notes</label>
        <input type="text" id="co-notes" placeholder="Optional">
      </div>
    </div>

    <div class="co-form">
      <h3>&#128230; Add Equipment to Call</h3>
      <button class="scan-btn" onclick="openScanner()">&#128247; Scan QR Code</button>
      <div class="scan-divider"><span>or select manually</span></div>
      <div class="add-item-row">
        <div class="form-group">
          <label>Equipment</label>
          <select id="co-equip-select">
            <option value="">— Select equipment —</option>
          </select>
        </div>
        <div class="form-group qty-group">
          <label>Qty</label>
          <input type="number" id="co-qty" value="1" min="1">
        </div>
      </div>
      <button class="tbtn tbtn-muted" onclick="addItemToCheckout()" style="width:100%;margin-bottom:4px;">+ Add Item</button>
      <div id="co-items-list"><div class="empty-small">No items added yet.</div></div>
    </div>

    <button class="submit-checkout-btn" onclick="submitCheckout()">&#128229; Open Call &amp; Check Out</button>
  </div>

  <!-- CHECK IN TAB -->
  <div id="tab-checkin" class="tab-content">
    <div class="co-form">
      <h3>&#128247; Scan to Check In</h3>
      <button class="scan-btn" onclick="openScanner('checkin')">&#128247; Scan QR Code</button>
      <div class="scan-divider"><span>or select from open calls</span></div>
    </div>
    <div id="checkin-calls-list"></div>
  </div>

  <!-- IN USE TAB -->
  <div id="tab-inuse" class="tab-content">
    <div id="active-calls-list"></div>
  </div>

  <!-- INVENTORY TAB -->
  <div id="tab-inventory" class="tab-content">
    <div class="toolbar">
      <input type="text" id="eq-search" placeholder="&#128269; Search equipment..." oninput="filterEquipment()">
      <button class="tbtn tbtn-primary admin-only" onclick="showAddEquipment()">+ Add</button>
      <button class="tbtn tbtn-muted   admin-only" onclick="bulkGenerateIds()">&#9638; Generate IDs</button>
      <button class="tbtn tbtn-danger  admin-only" onclick="resetAllEquipment()">&#8635; Reset</button>
    </div>
    <div id="equipment-list"></div>
  </div>

  <!-- USERS TAB (admin only) -->
  <div id="tab-users" class="tab-content">
    <div class="toolbar">
      <button class="tbtn tbtn-primary" onclick="showAddUser()" style="width:100%;">+ Add New User</button>
    </div>
    <div id="users-list"></div>
  </div>

  <!-- LOG TAB -->
  <div id="tab-log" class="tab-content">
    <div class="toolbar admin-only" style="margin-bottom:16px;">
      <button class="tbtn tbtn-muted" onclick="exportLog()" style="width:100%;">&#11015; Export Log as CSV</button>
    </div>
    <div id="log-list"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box">
    <h2 id="modal-title"></h2>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-ok" id="modal-confirm">Confirm</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  function switchTab(name, el) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
    if (el) el.classList.add("active");
    document.getElementById("tab-" + name).classList.add("active");
  }
</script>

<!-- SCANNER MODAL -->
<div id="scanner-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:1000;flex-direction:column;align-items:center;justify-content:center;padding:16px;">
  <div style="width:100%;max-width:400px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:700;color:var(--sky);letter-spacing:.06em;text-transform:uppercase;">Scan QR Code</div>
      <button onclick="closeScanner()" style="background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;padding:0 4px;">&#10005;</button>
    </div>
    <div style="position:relative;width:100%;border-radius:12px;overflow:hidden;background:#000;">
      <video id="scanner-video" style="width:100%;display:block;" playsinline></video>
      <canvas id="scanner-canvas" style="display:none;"></canvas>
      <!-- Scan frame overlay -->
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;">
        <div style="width:200px;height:200px;border:3px solid var(--sky);border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,.4);"></div>
      </div>
    </div>
    <div id="scanner-status" style="text-align:center;color:var(--muted);font-size:.85rem;margin-top:12px;padding:8px;"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>

</body>
</html>
